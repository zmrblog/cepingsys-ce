<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noai, noimageai">
<title>审计查询系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="loginPage" class="page">
            <div class="login-bg">
                <div class="login-card">
                    <div class="login-logo">
                        <svg viewBox="0 0 48 48" width="48" height="48"><rect x="8" y="4" width="32" height="40" rx="3" fill="none" stroke="#5b8def" stroke-width="2.5"/><line x1="16" y1="14" x2="32" y2="14" stroke="#5b8def" stroke-width="2"/><line x1="16" y1="21" x2="32" y2="21" stroke="#5b8def" stroke-width="2"/><line x1="16" y1="28" x2="26" y2="28" stroke="#5b8def" stroke-width="2"/><circle cx="18" cy="36" r="5" fill="none" stroke="#5b8def" stroke-width="2"/></svg>
                    </div>
                    <h1>审计查询系统</h1>
                    <p class="login-sub">独立审计入口 · 请使用审计专用账号登录</p>
                    <div class="login-form">
                        <div class="input-group">
                            <label>审计账号</label>
                            <input type="text" id="username" placeholder="请输入审计账号" autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label>登录密码</label>
                            <input type="password" id="password" placeholder="请输入密码" autocomplete="off">
                        </div>
                        <div id="loginError" class="login-error" style="display:none;"></div>
                        <button id="loginBtn" class="btn-primary btn-full">登 录</button>
                    </div>
                    <p class="login-foot">内部审计系统 · 未经授权请勿访问</p>
                </div>
            </div>
        </div>

        <div id="queryPage" class="page" style="display:none;">
            <header class="header">
                <div class="header-left">
                    <svg viewBox="0 0 48 48" width="28" height="28"><rect x="8" y="4" width="32" height="40" rx="3" fill="none" stroke="#5b8def" stroke-width="2.5"/><line x1="16" y1="14" x2="32" y2="14" stroke="#5b8def" stroke-width="2"/><line x1="16" y1="21" x2="32" y2="21" stroke="#5b8def" stroke-width="2"/><line x1="16" y1="28" x2="26" y2="28" stroke="#5b8def" stroke-width="2"/></svg>
                    <h1>审计查询系统</h1>
                    <nav class="tabs">
                        <button class="tab active" data-tab="query">数据查询</button>
                        <button class="tab" data-tab="accounts">账号管理</button>
                    </nav>
                </div>
                <div class="header-right">
                    <span id="currentUser" class="user-tag"></span>
                    <button id="logoutBtn" class="btn-outline-sm">退出</button>
                </div>
            </header>

            <div id="tabQuery" class="tab-content active">
                <div class="toolbar">
                    <div class="toolbar-item">
                        <label>参评单位</label>
                        <select id="unitSelect"><option value="">全部单位</option></select>
                    </div>
                    <button id="queryBtn" class="btn-primary">查询</button>
                    <button id="clearBtn" class="btn-outline">清空</button>
                    <button id="exportBtn" class="btn-export">导出 Excel</button>
                </div>

                <div id="resultSection" class="result-wrap" style="display:none;">
                    <div class="result-top">
                        <span class="result-title">查询结果</span>
                        <span id="resultMeta" class="result-count"></span>
                    </div>
                    <div class="table-scroll">
                        <table id="resultTable">
                            <thead>
                                <tr class="col-headers">
                                    <th class="col-seq">序号</th>
                                    <th data-col="examine_name" class="filterable">测评任务 <span class="filter-icon">&#9660;</span></th>
                                    <th data-col="user_name" class="filterable">投票人 <span class="filter-icon">&#9660;</span></th>
                                    <th data-col="user_phone" class="filterable">手机号 <span class="filter-icon">&#9660;</span></th>
                                    <th data-col="user_type" class="filterable">用户类型 <span class="filter-icon">&#9660;</span></th>
                                    <th data-col="target_name" class="filterable">被评对象 <span class="filter-icon">&#9660;</span></th>
                                    <th data-col="target_type" class="filterable">对象类型 <span class="filter-icon">&#9660;</span></th>
                                    <th data-col="item_title" class="filterable">测评项目 <span class="filter-icon">&#9660;</span></th>
                                    <th data-col="item_type" class="filterable">题型 <span class="filter-icon">&#9660;</span></th>
                                    <th data-col="answer_value" class="filterable">评分/答案 <span class="filter-icon">&#9660;</span></th>
                                    <th data-col="example_text" class="filterable">事例说明 <span class="filter-icon">&#9660;</span></th>
                                    <th data-col="answered_at" class="filterable">作答时间 <span class="filter-icon">&#9660;</span></th>
                                </tr>
                            </thead>
                            <tbody id="resultBody"></tbody>
                        </table>
                    </div>
                    <div id="noData" class="empty-state" style="display:none;">暂无数据</div>
                </div>
            </div>

            <div id="tabAccounts" class="tab-content">
                <div class="accounts-toolbar">
                    <span class="section-title">审计账号列表</span>
                    <button id="addAccountBtn" class="btn-primary">新增账号</button>
                </div>
                <div class="accounts-table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>用户名</th>
                                <th>姓名</th>
                                <th>状态</th>
                                <th>最后登录</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="accountsBody"></tbody>
                    </table>
                </div>
                <div id="noAccounts" class="empty-state" style="display:none;">暂无账号</div>
            </div>
        </div>

        <div id="filterDropdown" class="filter-dropdown" style="display:none;">
            <div class="filter-dropdown-body">
                <input type="text" class="filter-search" placeholder="搜索...">
                <div class="filter-actions">
                    <button class="filter-btn-link" data-action="selectAll">全选</button>
                    <button class="filter-btn-link" data-action="deselectAll">取消全选</button>
                </div>
                <div class="filter-list"></div>
                <div class="filter-footer">
                    <button class="btn-primary btn-sm" data-action="ok">确定</button>
                    <button class="btn-outline btn-sm" data-action="reset">重置</button>
                </div>
            </div>
        </div>

        <div id="accountModal" class="modal-overlay" style="display:none;">
            <div class="modal-card">
                <div class="modal-header">
                    <h3 id="modalTitle">新增账号</h3>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editUserId">
                    <div class="input-group">
                        <label>用户名 <span class="required">*</span></label>
                        <input type="text" id="editUsername" placeholder="审计登录账号" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>密码 <span id="pwdRequired" class="required">*</span></label>
                        <input type="password" id="editPassword" placeholder="至少6位" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>姓名</label>
                        <input type="text" id="editRealName" placeholder="审计员姓名" autocomplete="off">
                    </div>
                    <div id="modalError" class="login-error" style="display:none;"></div>
                </div>
                <div class="modal-footer">
                    <button id="modalCancel" class="btn-outline">取消</button>
                    <button id="modalSave" class="btn-primary">保存</button>
                </div>
            </div>
        </div>

        <div id="confirmDialog" class="modal-overlay" style="display:none;">
            <div class="modal-card" style="max-width:380px;">
                <div class="modal-header">
                    <h3>确认操作</h3>
                </div>
                <div class="modal-body">
                    <p id="confirmMsg"></p>
                </div>
                <div class="modal-footer">
                    <button id="confirmCancel" class="btn-outline">取消</button>
                    <button id="confirmOk" class="btn-primary btn-danger">确认</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
